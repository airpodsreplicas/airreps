name: Translation Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch: # Allow manual re-runs from the Actions UI
  push:
    branches: [main]
    paths:
      - 'docs/*.md'
      - 'docs/introduction/**/*.md'
      - 'docs/version-info/**/*.md'
      - 'docs/ordering/**/*.md'
      - 'docs/links/**/*.md'
      - 'docs/troubleshooting/**/*.md'

concurrency:
  group: translation-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  sync-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main # Always checkout latest main so a surviving queued run catches all pending changes

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get changed English files
        id: changed
        run: |
          # Diff from the last successful translation sync to HEAD rather than from
          # the triggering push's before-SHA. This means whichever run survives
          # queue-cancellation (caused by rapid pushes) still catches every
          # accumulated English change since the previous sync — nothing is lost.
          LAST_SYNC=$(git log --format="%H %s" HEAD | grep -m1 "chore: sync translated docs" | awk '{print $1}')

          if [ -z "$LAST_SYNC" ]; then
            echo "No previous sync found — using root commit as base."
            LAST_SYNC=$(git rev-list --max-parents=0 HEAD)
          else
            echo "Last sync commit: $LAST_SYNC"
          fi

          # English files changed since last sync (excluding locale dirs)
          FILES=$(git diff --diff-filter=AMR --name-only "$LAST_SYNC" HEAD -- docs | grep -E '^docs/.+\.md$' | grep -v -E '^docs/(pt|es|da|fr|pl|ru)/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COUNT=$(echo "$FILES" | grep -c . || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          # ALL files changed since last sync — locale paths here are used by the
          # translate script to skip files that were already manually updated,
          # protecting hand-curated translations from being overwritten.
          ALL_FILES=$(git diff --diff-filter=AMR --name-only "$LAST_SYNC" HEAD -- docs | grep -E '^docs/.+\.md$' || true)
          echo "all_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Changed English files ($COUNT):"
          echo "$FILES"

      - name: Translate changed files
        if: steps.changed.outputs.count != '0'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OPENROUTER_HTTP_REFERER: ${{ vars.OPENROUTER_HTTP_REFERER }}
          OPENROUTER_APP_TITLE: ${{ vars.OPENROUTER_APP_TITLE }}
          TRANSLATION_LOCALES: ${{ vars.TRANSLATION_LOCALES }}
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_files }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: bun .github/scripts/translate-docs.mjs

      - name: Detect locale file changes
        if: steps.changed.outputs.count != '0'
        id: locale_changes
        run: |
          COUNT=$(git status --porcelain -- docs/es docs/pt docs/da docs/fr docs/pl docs/ru | grep -c . || true)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Create translation pull request
        if: steps.changed.outputs.count != '0' && steps.locale_changes.outputs.count != '0'
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            docs/es
            docs/pt
            docs/da
            docs/fr
            docs/pl
            docs/ru
          branch: automation/translation-sync
          delete-branch: true
          commit-message: 'chore: sync translated docs'
          title: '[Translations] Sync localized docs'
          body: |
            ## What changed
            - Sync localized docs from the latest English changes on `main`
            - Covers all English files changed since the last translation sync

            ## Changed English files
            ${{ steps.changed.outputs.files }}
          labels: |
            translation
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Enable auto-merge for translation pull request
        if: steps.create_pr.outputs.pull-request-operation == 'created' || steps.create_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Close stale translation pull request
        if: steps.changed.outputs.count != '0' && steps.locale_changes.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list --state open --head automation/translation-sync --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --delete-branch --comment "Closing automatically because the latest translation sync found no remaining locale changes."
          else
            echo "No open translation PR to close."
          fi
