name: Translation Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/*.md'
      - 'docs/introduction/**/*.md'
      - 'docs/version-info/**/*.md'
      - 'docs/ordering/**/*.md'
      - 'docs/links/**/*.md'
      - 'docs/troubleshooting/**/*.md'

concurrency:
  group: translation-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get changed English files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            RANGE="HEAD~1 HEAD"
          else
            RANGE="$BEFORE_SHA $AFTER_SHA"
          fi

          FILES=$(git diff --diff-filter=AMR --name-only $RANGE -- docs | grep -E '^docs/.+\.md$' | grep -v -E '^docs/(pt|es|da|fr|pl|ru)/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COUNT=$(echo "$FILES" | grep -c . || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          ALL_FILES=$(git diff --diff-filter=AMR --name-only $RANGE -- docs | grep -E '^docs/.+\.md$' || true)
          echo "all_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Translate changed files
        if: steps.changed.outputs.count != '0'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          OPENROUTER_HTTP_REFERER: ${{ vars.OPENROUTER_HTTP_REFERER }}
          OPENROUTER_APP_TITLE: ${{ vars.OPENROUTER_APP_TITLE }}
          TRANSLATION_LOCALES: ${{ vars.TRANSLATION_LOCALES }}
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_files }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: bun .github/scripts/translate-docs.mjs

      - name: Create translation pull request
        if: steps.changed.outputs.count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            docs/es
            docs/pt
            docs/da
            docs/fr
            docs/pl
            docs/ru
          branch: automation/translation-sync
          delete-branch: true
          commit-message: 'chore: sync translated docs'
          title: '[Translations] Sync localized docs'
          body: |
            ## What changed
            - Sync localized docs from the latest English changes on `main`
            - Updated only files touched by the triggering push

            ## Changed English files
            ${{ steps.changed.outputs.files }}
          labels: |
            translation
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
