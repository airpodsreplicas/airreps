version: 2
updates:
  # "bun" (not "npm") so Dependabot updates bun.lock alongside package.json —
  # npm-ecosystem PRs leave bun.lock stale, which fails the
  # `bun install --frozen-lockfile` step in every workflow.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
